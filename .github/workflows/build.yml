name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  pull-requests: read
jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Validate SonarCloud token
        run: |
          test -n "$SONAR_TOKEN" || { echo "SONAR_TOKEN secret is not set"; exit 1; }
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Compile Java sources
        run: |
          rm -rf bin
          mkdir -p bin
          find src -name "*.java" -print0 | xargs -0 javac -encoding UTF-8 -d bin
      - name: Validate SonarCloud configuration
        run: |
          test -f sonar-project.properties || { echo "Missing sonar-project.properties"; exit 1; }
          echo "Configured Sonar project key:"
          grep '^sonar.projectKey=' sonar-project.properties || { echo "Missing sonar.projectKey"; exit 1; }
          echo "Configured Sonar organization:"
          grep '^sonar.organization=' sonar-project.properties || { echo "Missing sonar.organization"; exit 1; }
          test -d bin || { echo "Missing bin directory"; exit 1; }
          find bin -name "*.class" | grep -q . || { echo "No compiled .class files found in bin"; exit 1; }
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.verbose=true
            -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
